services:
  db:
    image: postgres:16
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-bepi}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-bepi}
      POSTGRES_DB: ${POSTGRES_DB:-bepi}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-bepi}"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
