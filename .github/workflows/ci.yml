name: ci

# main auto-deploys to Streamlit Cloud, so a syntax/import error ships live.
# This guards every push/PR with a compile check + the unit tests.
on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - name: Install deps
        run: |
          pip install -r requirements.txt
          pip install -r requirements-dev.txt
      - name: Compile (catches syntax / import-time breakage before deploy)
        run: python -m compileall -q streamlit_app.py src/
      - name: Unit tests
        run: pytest tests/ -q
